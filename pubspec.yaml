name: ergo
description: A scalable, offline-first mobile learning application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Routing
  go_router: ^12.1.1
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  
  # Utilities
  uuid: ^4.2.2
  http: ^1.2.0
  archive: ^3.4.10
  confetti: ^0.8.0
  google_fonts: ^8.0.2
  audioplayers: ^6.5.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  
flutter:
  uses-material-design: true
  assets:
    - assets/audio/
